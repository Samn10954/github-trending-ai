  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0d1117; color:#c9d1d9; }
    .container { max-width:1200px; margin:0 auto; padding:20px; }
    header { text-align:center; padding:40px 0 24px; border-bottom:1px solid #30363d; margin-bottom:24px; }
    h1 { font-size:2.4rem; background:linear-gradient(90deg,#58a6ff,#a371f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:flex; align-items:center; justify-content:center; gap:12px; }
    .cat-logo { font-size:2.8rem; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
    .subtitle { color:#8b949e; margin-top:10px; }

    .date-nav,.tag-filter { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .date-nav { margin-bottom:20px; }
    .date-btn,.tag-btn,.sort-select,.trend-btn,.fav-btn { border:1px solid #30363d; background:#21262d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:8px; }
    .date-btn.active,.tag-btn.active,.trend-btn.active,.fav-btn.active { background:#238636; border-color:#238636; color:#fff; }
    .toolbar { display:grid; gap:16px; margin:18px 0 22px; }
    .filter-section,.archive-section,.chart-section { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:15px; }
    .filter-label { color:#8b949e; margin-bottom:10px; }
    .filter-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .sort-wrap { display:flex; align-items:center; gap:8px; color:#8b949e; }
    .stats { display:flex; justify-content:center; gap:36px; margin-bottom:24px; color:#8b949e; flex-wrap:wrap; }
    .stats strong { color:#58a6ff; font-size:1.4rem; }
    .content-grid { display:grid; grid-template-columns:1fr 280px; gap:20px; }
    .project-list { display:grid; gap:16px; }
    .project-card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:18px; }
    .project-header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:12px; }
    .project-name { color:#58a6ff; text-decoration:none; font-size:1.1rem; font-weight:600; }
    .project-stats { display:flex; gap:14px; flex-wrap:wrap; color:#8b949e; font-size:.92rem; }
    .stat.star { color:#e3b341; } .stat.period { color:#238636; }
    .project-desc-zh { color:#e6edf3; line-height:1.6; margin-bottom:8px; }
    .project-desc-en { color:#8b949e; line-height:1.5; margin-bottom:12px; font-size:.95rem; }
    .keywords { display:flex; gap:8px; flex-wrap:wrap; }
    .keyword { background:#21262d; color:#a371f7; border-radius:999px; padding:3px 9px; font-size:.8rem; }
    .archive-list { display:grid; gap:8px; }
    .archive-item { display:flex; justify-content:space-between; gap:12px; background:#0d1117; color:#c9d1d9; text-decoration:none; border:1px solid #30363d; border-radius:8px; padding:10px 12px; font-size:.92rem; }
    .chart-canvas { width:100%; height:240px; display:block; background:#0d1117; border:1px solid #30363d; border-radius:8px; }
    .card-actions { margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; }
    .empty { text-align:center; color:#8b949e; padding:32px; background:#161b22; border:1px solid #30363d; border-radius:10px; }
    @media (max-width:900px) { .content-grid { grid-template-columns:1fr; } }
    @media (max-width:768px) { .project-header { flex-direction:column; } .filter-row { align-items:flex-start; } }
  </style>
</head>
<body>
  <div class="container">
    <header>

    </header>

    <div class="date-nav"><a href="./daily-2026-03-17.html" class="date-btn active">昨天</a></div>

    <div class="toolbar">
      <div class="filter-section">
        <div class="filter-row">
          <div><div class="filter-label">🏷️ 标签筛选</div><div class="tag-filter"><button class="tag-btn active" data-tag="all">全部</button>

<button class="tag-btn" data-tag="training">训练/推理</button></div></div>

<a href="./weekly.html" class="tag-btn period-btn">周榜</a>
<a href="./monthly.html" class="tag-btn period-btn">月榜</a></div></div>
          <div class="sort-wrap"><label for="sortSelect">排序</label><select id="sortSelect" class="sort-select"><option value="stars_period">按周期新增排序</option>
<option value="stars">按总 Stars 排序</option>

<option value="stars">总 Stars</option></select></div>
        </div>

    </div>

    <div class="stats"><div>项目数: <strong id="totalCount">4</strong></div><div>周期新增: <strong id="totalStars">6039</strong> ⭐</div></div>

      <div class="section-title">项目趋势图</div>
      <canvas id="trendChart" class="chart-canvas" width="1000" height="240"></canvas>
      <div style="margin-top:10px;color:#8b949e;font-size:.9rem;" id="trendTitle">点击项目卡片中的“查看趋势”查看该项目在历史日期中的变化</div>

    <div class="content-grid">
      <div class="project-list" id="projectList"></div>
      <aside class="archive-section"><div class="section-title">历史日期</div><div class="archive-list"><a class="archive-item" href="./daily-2026-03-17.html"><span>昨天 / 2026-03-17</span><span>4 个项目</span></a></div></aside>
    </div>
  </div>

  <script id="projects-data" type="application/json">[{"name": "obra/superpowers", "owner": "obra", "repo": "superpowers", "url": "https://github.com/obra/superpowers", "description_en": "An agentic skills framework & software development methodology that works.", "description_zh": "An 智能体化 技能 框架 & software development methodology that works.", "stars": 91124, "forks": 7213, "stars_period": 3050, "matched_keywords": ["agentic"], "tags": ["agent"], "relevance_score": 3}, {"name": "langchain-ai/deepagents", "owner": "langchain-ai", "repo": "deepagents", "url": "https://github.com/langchain-ai/deepagents", "description_en": "Agent harness built with LangChain and LangGraph. Equipped with a planning tool, a filesystem backend, and the ability to spawn subagents - well-equipped to handle complex agentic tasks.", "description_zh": "智能体 harness built with LangChain and LangGraph. Equipped with a planning tool, a filesystem backend, and the ability to spawn subagents - well-equipped to handle complex 智能体化 tasks.", "stars": 13692, "forks": 2079, "stars_period": 1418, "matched_keywords": ["agent", "agentic", "ai"], "tags": ["agent"], "relevance_score": 10}, {"name": "abhigyanpatwari/GitNexus", "owner": "abhigyanpatwari", "repo": "GitNexus", "url": "https://github.com/abhigyanpatwari/GitNexus", "description_en": "GitNexus: The Zero-Server Code Intelligence Engine - GitNexus is a client-side knowledge graph creator that runs entirely in your browser. Drop in a GitHub repo or ZIP file, and get an interactive knowledge graph wit a built in Graph RAG Agent. Perfect for code exploration", "description_zh": "GitNexus: The Zero-Server Code Intelligence Engine - GitNexus is a client-side knowledge graph creator that runs entirely in your 浏览器. Drop in a GitHub repo or ZIP file, and get an interactive knowled...", "stars": 16407, "forks": 1868, "stars_period": 1117, "matched_keywords": ["agent", "knowledge graph", "rag"], "tags": ["agent", "rag"], "relevance_score": 8}, {"name": "jarrodwatts/claude-hud", "owner": "jarrodwatts", "repo": "claude-hud", "url": "https://github.com/jarrodwatts/claude-hud", "description_en": "A Claude Code plugin that shows what's happening - context usage, active tools, running agents, and todo progress", "description_zh": "A Claude Code 插件 that shows what's happening - 上下文 usage, active tools, running 智能体, and todo progress", "stars": 5311, "forks": 239, "stars_period": 454, "matched_keywords": ["claude"], "tags": ["llm"], "relevance_score": 6}]</script>
  <script id="trends-data" type="application/json">{"obra/superpowers": [{"date": "2026-03-17", "stars_period": 3050, "stars": 91124}], "langchain-ai/deepagents": [{"date": "2026-03-17", "stars_period": 1418, "stars": 13692}], "abhigyanpatwari/GitNexus": [{"date": "2026-03-17", "stars_period": 1117, "stars": 16407}], "jarrodwatts/claude-hud": [{"date": "2026-03-17", "stars_period": 454, "stars": 5311}]}</script>
  <script>
    const projects = JSON.parse(document.getElementById('projects-data').textContent);
    const projectTrends = JSON.parse(document.getElementById('trends-data').textContent);
    const favoritesKey = 'github-trending-ai-favorites';
    let favorites = JSON.parse(localStorage.getItem(favoritesKey) || '[]');
    let activeTag = 'all';
    let activeSort = 'stars_period';
    let activeChartMetric = 'stars_period';
    let activeTrendProject = null;

    function formatNumber(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n); }
    function sortProjects(items) { return [...items].sort((a,b) => (b[activeSort] || 0) - (a[activeSort] || 0)); }
    function escapeHtml(s) { return String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }

    function toggleFavorite(name) {
      if (favorites.includes(name)) favorites = favorites.filter(x => x !== name);
      else favorites.push(name);
      localStorage.setItem(favoritesKey, JSON.stringify(favorites));
      renderProjects();
    }

    function drawTrendChart(projectName) {
      const canvas = document.getElementById('trendChart');
      const ctx = canvas.getContext('2d');
      const title = document.getElementById('trendTitle');
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, w, h);
      if (!projectName || !projectTrends[projectName] || !projectTrends[projectName].length) {
        title.textContent = '点击项目卡片中的“查看趋势”查看该项目在历史日期中的变化';
        return;
      }
      const series = projectTrends[projectName];
      title.textContent = projectName + ' 的历史趋势（' + (activeChartMetric === 'stars' ? '总 Stars' : '周期新增') + '）';
      const values = series.map(x => x[activeChartMetric] || 0);
      const maxVal = Math.max(...values, 1);
      const left = 50, right = 20, top = 20, bottom = 40;
      const plotW = w - left - right, plotH = h - top - bottom;
      ctx.strokeStyle = '#30363d'; ctx.beginPath(); ctx.moveTo(left, top); ctx.lineTo(left, h - bottom); ctx.lineTo(w - right, h - bottom); ctx.stroke();
      ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 2; ctx.beginPath();
      series.forEach((point, i) => {
        const x = left + (plotW * i) / Math.max(series.length - 1, 1);
        const y = top + plotH - (((point[activeChartMetric] || 0)) / maxVal) * plotH;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        ctx.fillStyle = '#a371f7'; ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
      });
      ctx.strokeStyle = '#58a6ff'; ctx.stroke();
      ctx.fillStyle = '#8b949e'; ctx.font = '12px sans-serif';
      series.forEach((point, i) => {
        const x = left + (plotW * i) / Math.max(series.length - 1, 1);
        ctx.fillText(String(point.date).slice(5), x - 18, h - 15);
      });
    }

    function renderProjects() {
      const listEl = document.getElementById('projectList');
      const filtered = activeTag === 'all' ? projects : projects.filter(p => (p.tags || []).includes(activeTag));
      const sorted = sortProjects(filtered);
      document.getElementById('totalCount').textContent = sorted.length;
      document.getElementById('totalStars').textContent = sorted.reduce((s,p) => s + (p.stars_period || 0), 0).toLocaleString();
      if (!sorted.length) { listEl.innerHTML = '<div class="empty">没有找到匹配项目</div>'; return; }
      listEl.innerHTML = sorted.map(p => {
        const fav = favorites.includes(p.name);
        const trendActive = activeTrendProject === p.name;
        const tags = (p.tags || []).map(tag => '<span class="keyword">' + escapeHtml(tag) + '</span>').join('');
        return '<div class="project-card">'
          + '<div class="project-header">'
          + '<a class="project-name" href="' + escapeHtml(p.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(p.name) + '</a>'
          + '<div class="project-stats">'
          + '<span class="stat star">⭐ ' + formatNumber(p.stars) + '</span>'
          + '<span class="stat period">+' + ((p.stars_period || 0).toLocaleString()) + '</span>'
          + '<span class="stat">⑂ ' + formatNumber(p.forks) + '</span>'
          + '<span class="stat">相关性 ' + (p.relevance_score || 0) + '</span>'
          + '</div></div>'
          + '<div class="project-desc-zh">' + escapeHtml(p.description_zh || '暂无中文简介') + '</div>'
          + '<div class="project-desc-en">' + escapeHtml(p.description_en || '') + '</div>'
          + '<div class="keywords">' + tags + '</div>'
          + '<div class="card-actions">'
          + '<button class="fav-btn ' + (fav ? 'active' : '') + '" data-name="' + escapeHtml(p.name) + '">' + (fav ? '★ 已收藏' : '☆ 收藏') + '</button>'
          + '<button class="trend-btn ' + (trendActive ? 'active' : '') + '" data-name="' + escapeHtml(p.name) + '">查看趋势</button>'
          + '</div></div>';
      }).join('');
      document.querySelectorAll('.fav-btn').forEach(btn => btn.addEventListener('click', () => toggleFavorite(btn.dataset.name)));
      document.querySelectorAll('.trend-btn').forEach(btn => btn.addEventListener('click', () => { activeTrendProject = btn.dataset.name; drawTrendChart(activeTrendProject); renderProjects(); }));
    }

    document.querySelectorAll('.tag-btn:not(.period-btn)').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.tag-btn:not(.period-btn)').forEach(node => node.classList.remove('active'));
      btn.classList.add('active');
      activeTag = btn.dataset.tag;
      renderProjects();
    }));
    document.getElementById('sortSelect').addEventListener('change', (event) => { activeSort = event.target.value; renderProjects(); });
    document.getElementById('chartMetricSelect').addEventListener('change', (event) => { activeChartMetric = event.target.value; drawTrendChart(activeTrendProject); });

    renderProjects();
    drawTrendChart(null);
  </script>
</body>
</html>
