<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending AI - 2026-03-17</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0d1117; color:#c9d1d9; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align:center; padding:40px 0 24px; border-bottom:1px solid #30363d; margin-bottom:24px; }
    h1 { font-size: 2.5rem; background: linear-gradient(90deg,#58a6ff,#a371f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .subtitle { color:#8b949e; margin-top: 10px; }
    .date-nav, .tag-filter { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .date-nav { margin-bottom: 20px; }
    .date-btn, .tag-btn { border:1px solid #30363d; background:#21262d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:8px; cursor:pointer; }
    .date-btn.active, .tag-btn.active { background:#238636; border-color:#238636; color:#fff; }
    .filter-section { margin: 18px 0 22px; background:#161b22; border:1px solid #30363d; border-radius:10px; padding:15px; }
    .filter-label { color:#8b949e; margin-bottom:10px; }
    .stats { display:flex; justify-content:center; gap:36px; margin-bottom:24px; color:#8b949e; flex-wrap:wrap; }
    .stats strong { color:#58a6ff; font-size:1.4rem; }
    .project-list { display:grid; gap:16px; }
    .project-card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:18px; }
    .project-header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:12px; }
    .project-name { color:#58a6ff; text-decoration:none; font-size:1.1rem; font-weight:600; }
    .project-stats { display:flex; gap:14px; flex-wrap:wrap; color:#8b949e; font-size:.92rem; }
    .stat.star { color:#e3b341; }
    .stat.period { color:#238636; }
    .project-desc-zh { color:#e6edf3; line-height:1.6; margin-bottom:8px; }
    .project-desc-en { color:#8b949e; line-height:1.5; margin-bottom:12px; font-size:.95rem; }
    .keywords { display:flex; gap:8px; flex-wrap:wrap; }
    .keyword { background:#21262d; color:#a371f7; border-radius:999px; padding:3px 9px; font-size:.8rem; }
    .empty { text-align:center; color:#8b949e; padding:32px; }
    @media (max-width: 768px) { .project-header { flex-direction:column; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 GitHub Trending AI</h1>
      <p class="subtitle">每日 AI、具身智能热门开源项目精选 · 当前日期 2026-03-17 · 周期 weekly</p>
    </header>

    <div class="date-nav">
      <a href="./2026-03-17.html" class="date-btn active">今天</a>
    </div>

    <div class="filter-section">
      <div class="filter-label">🏷️ 标签筛选</div>
      <div class="tag-filter">
        <button class="tag-btn active" data-tag="all">全部</button>
<button class="tag-btn" data-tag="agent">Agent</button>
<button class="tag-btn" data-tag="llm">LLM</button>
<button class="tag-btn" data-tag="robotics">机器人/具身</button>
<button class="tag-btn" data-tag="vision">视觉/CV</button>
<button class="tag-btn" data-tag="multimodal">多模态</button>
<button class="tag-btn" data-tag="speech">语音/TTS</button>
<button class="tag-btn" data-tag="rag">RAG</button>
<button class="tag-btn" data-tag="training">训练/推理</button>
      </div>
    </div>

    <div class="stats">
      <div>项目数: <strong id="totalCount">9</strong></div>
      <div>周期新增: <strong id="totalStars">75510</strong> ⭐</div>
    </div>

    <div class="project-list" id="projectList"></div>
  </div>

  <script>
    const projects = [{"name": "msitarzewski/agency-agents", "owner": "msitarzewski", "repo": "agency-agents", "url": "https://github.com/msitarzewski/agency-agents", "description_en": "A complete AI agency at your fingertips - From frontend wizards to Reddit community ninjas, from whimsy injectors to reality checkers. Each agent is a specialized expert with personality, processes, and proven deliverables.", "description_zh": "A complete AI agency at your fingertips - From frontend wizards to Reddit community ninjas, from whimsy injectors to reality checkers. Each agent is a specialized expert with personality, processes, and proven deliverables.", "stars": 50934, "forks": 7586, "stars_period": 32648, "matched_keywords": ["agent", "ai"], "tags": ["agent"], "relevance_score": 5}, {"name": "obra/superpowers", "owner": "obra", "repo": "superpowers", "url": "https://github.com/obra/superpowers", "description_en": "An agentic skills framework & software development methodology that works.", "description_zh": "An agentic skills framework & software development methodology that works.", "stars": 91008, "forks": 7205, "stars_period": 13195, "matched_keywords": ["agentic"], "tags": ["agent"], "relevance_score": 3}, {"name": "alibaba/page-agent", "owner": "alibaba", "repo": "page-agent", "url": "https://github.com/alibaba/page-agent", "description_en": "JavaScript in-page GUI agent. Control web interfaces with natural language.", "description_zh": "JavaScript in-page GUI agent. Control web interfaces with natural language.", "stars": 10187, "forks": 778, "stars_period": 7084, "matched_keywords": ["agent"], "tags": ["agent"], "relevance_score": 9}, {"name": "promptfoo/promptfoo", "owner": "promptfoo", "repo": "promptfoo", "url": "https://github.com/promptfoo/promptfoo", "description_en": "Test your prompts, agents, and RAGs. Red teaming/pentesting/vulnerability scanning for AI. Compare performance of GPT, Claude, Gemini, Llama, and more. Simple declarative configs with command line and CI/CD integration.", "description_zh": "Test your prompts, agents, and RAGs. Red teaming/pentesting/vulnerability scanning for AI. Compare performance of GPT, Claude, Gemini, Llama, and more. Simple declarative configs with command line and CI/CD integration.", "stars": 17072, "forks": 1478, "stars_period": 5792, "matched_keywords": ["ai", "claude", "gemini", "gpt"], "tags": ["llm"], "relevance_score": 8}, {"name": "NousResearch/hermes-agent", "owner": "NousResearch", "repo": "hermes-agent", "url": "https://github.com/NousResearch/hermes-agent", "description_en": "The agent that grows with you", "description_zh": "The agent that grows with you", "stars": 8333, "forks": 972, "stars_period": 5270, "matched_keywords": ["agent"], "tags": ["agent"], "relevance_score": 9}, {"name": "AstrBotDevs/AstrBot", "owner": "AstrBotDevs", "repo": "AstrBot", "url": "https://github.com/AstrBotDevs/AstrBot", "description_en": "Agentic IM Chatbot infrastructure that integrates lots of IM platforms, LLMs, plugins and AI feature, and can be your openclaw alternative. ✨", "description_zh": "Agentic IM Chatbot infrastructure that integrates lots of IM platforms, LLMs, plugins and AI feature, and can be your openclaw alternative. ✨", "stars": 25516, "forks": 1742, "stars_period": 5107, "matched_keywords": ["agentic", "ai"], "tags": ["agent"], "relevance_score": 5}, {"name": "fishaudio/fish-speech", "owner": "fishaudio", "repo": "fish-speech", "url": "https://github.com/fishaudio/fish-speech", "description_en": "SOTA Open Source TTS", "description_zh": "SOTA Open Source TTS", "stars": 27939, "forks": 2328, "stars_period": 2638, "matched_keywords": ["speech", "tts"], "tags": ["speech"], "relevance_score": 7}, {"name": "virattt/ai-hedge-fund", "owner": "virattt", "repo": "ai-hedge-fund", "url": "https://github.com/virattt/ai-hedge-fund", "description_en": "An AI Hedge Fund Team", "description_zh": "An AI Hedge Fund Team", "stars": 49206, "forks": 8564, "stars_period": 2162, "matched_keywords": ["ai"], "tags": ["ai"], "relevance_score": 6}, {"name": "vectorize-io/hindsight", "owner": "vectorize-io", "repo": "hindsight", "url": "https://github.com/vectorize-io/hindsight", "description_en": "Hindsight: Agent Memory That Learns", "description_zh": "Hindsight: Agent Memory That Learns", "stars": 4508, "forks": 300, "stars_period": 1614, "matched_keywords": ["agent"], "tags": ["agent"], "relevance_score": 3}];
    let activeTag = 'all';

    function formatNumber(n) {
      return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
    }

    function renderProjects() {
      const listEl = document.getElementById('projectList');
      const filtered = activeTag === 'all'
        ? projects
        : projects.filter(p => (p.tags || []).includes(activeTag));

      document.getElementById('totalCount').textContent = filtered.length;
      document.getElementById('totalStars').textContent = filtered.reduce((sum, p) => sum + (p.stars_period || 0), 0).toLocaleString();

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">没有找到匹配项目</div>';
        return;
      }

      listEl.innerHTML = filtered.map(p => `
        <div class="project-card">
          <div class="project-header">
            <a class="project-name" href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a>
            <div class="project-stats">
              <span class="stat star">⭐ ${formatNumber(p.stars)}</span>
              <span class="stat period">+${(p.stars_period || 0).toLocaleString()}</span>
              <span class="stat">⑂ ${formatNumber(p.forks)}</span>
            </div>
          </div>
          <div class="project-desc-zh">${p.description_zh || '暂无中文简介'}</div>
          <div class="project-desc-en">${p.description_en || ''}</div>
          <div class="keywords">
            ${(p.tags || []).map(tag => `<span class="keyword">${tag}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    document.querySelectorAll('.tag-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tag-btn').forEach(node => node.classList.remove('active'));
        btn.classList.add('active');
        activeTag = btn.dataset.tag;
        renderProjects();
      });
    });

    renderProjects();
  </script>
</body>
</html>
