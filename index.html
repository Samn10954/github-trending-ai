<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending AI - 每日精选</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0d1117; color:#c9d1d9; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align:center; padding:40px 0 24px; border-bottom:1px solid #30363d; margin-bottom:24px; }
    h1 { font-size: 2.5rem; background: linear-gradient(90deg,#58a6ff,#a371f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .subtitle { color:#8b949e; margin-top:10px; }
    .section-title { font-size:1rem; color:#e6edf3; margin-bottom:12px; }
    .date-nav, .tag-filter { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .date-nav { margin-bottom: 20px; }
    .date-btn, .tag-btn, .sort-select { border:1px solid #30363d; background:#21262d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:8px; }
    .date-btn.active, .tag-btn.active { background:#238636; border-color:#238636; color:#fff; }
    .toolbar { display:grid; gap:16px; margin: 18px 0 22px; }
    .filter-section, .archive-section { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:15px; }
    .filter-label { color:#8b949e; margin-bottom:10px; }
    .filter-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .sort-wrap { display:flex; align-items:center; gap:8px; color:#8b949e; }
    .stats { display:flex; justify-content:center; gap:36px; margin-bottom:24px; color:#8b949e; flex-wrap:wrap; }
    .stats strong { color:#58a6ff; font-size:1.4rem; }
    .content-grid { display:grid; grid-template-columns: 1fr 280px; gap:20px; }
    .project-list { display:grid; gap:16px; }
    .project-card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:18px; }
    .project-header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:12px; }
    .project-name { color:#58a6ff; text-decoration:none; font-size:1.1rem; font-weight:600; }
    .project-stats { display:flex; gap:14px; flex-wrap:wrap; color:#8b949e; font-size:.92rem; }
    .stat.star { color:#e3b341; }
    .stat.period { color:#238636; }
    .project-desc-zh { color:#e6edf3; line-height:1.6; margin-bottom:8px; }
    .project-desc-en { color:#8b949e; line-height:1.5; margin-bottom:12px; font-size:.95rem; }
    .keywords { display:flex; gap:8px; flex-wrap:wrap; }
    .keyword { background:#21262d; color:#a371f7; border-radius:999px; padding:3px 9px; font-size:.8rem; }
    .archive-list { display:grid; gap:8px; }
    .archive-item { display:flex; justify-content:space-between; gap:12px; background:#0d1117; color:#c9d1d9; text-decoration:none; border:1px solid #30363d; border-radius:8px; padding:10px 12px; font-size:.92rem; }
    .archive-item:hover { border-color:#58a6ff; }
    .empty { text-align:center; color:#8b949e; padding:32px; background:#161b22; border:1px solid #30363d; border-radius:10px; }
    @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }
    @media (max-width: 768px) { .project-header { flex-direction:column; } .filter-row { align-items:flex-start; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 GitHub Trending AI</h1>
      <p class="subtitle">每日 AI、具身智能热门开源项目精选 · 当前日期 2026-03-17 · 周期 weekly</p>
    </header>

    <div class="date-nav">
      <a href="./2026-03-17.html" class="date-btn active">今天</a>
    </div>

    <div class="toolbar">
      <div class="filter-section">
        <div class="filter-row">
          <div>
            <div class="filter-label">🏷️ 标签筛选</div>
            <div class="tag-filter">
              <button class="tag-btn active" data-tag="all">全部</button>
<button class="tag-btn" data-tag="agent">Agent</button>
<button class="tag-btn" data-tag="llm">LLM</button>
<button class="tag-btn" data-tag="robotics">机器人/具身</button>
<button class="tag-btn" data-tag="vision">视觉/CV</button>
<button class="tag-btn" data-tag="multimodal">多模态</button>
<button class="tag-btn" data-tag="speech">语音/TTS</button>
<button class="tag-btn" data-tag="rag">RAG</button>
<button class="tag-btn" data-tag="training">训练/推理</button>
            </div>
          </div>
          <div class="sort-wrap">
            <label for="sortSelect">排序</label>
            <select id="sortSelect" class="sort-select">
              <option value="stars_period">按周期新增排序</option>
<option value="stars">按总 Stars 排序</option>
<option value="forks">按 Forks 排序</option>
<option value="relevance_score">按相关性排序</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="stats">
      <div>项目数: <strong id="totalCount">9</strong></div>
      <div>周期新增: <strong id="totalStars">75510</strong> ⭐</div>
    </div>

    <div class="content-grid">
      <div class="project-list" id="projectList"></div>
      <aside class="archive-section">
        <div class="section-title">历史日期</div>
        <div class="archive-list">
          <a class="archive-item" href="./2026-03-17.html"><span>今天 / 2026-03-17</span><span>9 个项目</span></a>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const projects = [{"name": "msitarzewski/agency-agents", "owner": "msitarzewski", "repo": "agency-agents", "url": "https://github.com/msitarzewski/agency-agents", "description_en": "A complete AI agency at your fingertips - From frontend wizards to Reddit community ninjas, from whimsy injectors to reality checkers. Each agent is a specialized expert with personality, processes, and proven deliverables.", "description_zh": "A complete AI agency at your fingertips - From frontend wizards to Reddit community ninjas, from whimsy injectors to reality checkers. Each agent is a specialized expert with personality, processes, a...", "stars": 50968, "forks": 7592, "stars_period": 32648, "matched_keywords": ["agent", "ai"], "tags": ["agent"], "relevance_score": 5}, {"name": "obra/superpowers", "owner": "obra", "repo": "superpowers", "url": "https://github.com/obra/superpowers", "description_en": "An agentic skills framework & software development methodology that works.", "description_zh": "有效的代理技能框架和软件开发方法。", "stars": 91058, "forks": 7206, "stars_period": 13195, "matched_keywords": ["agentic"], "tags": ["agent"], "relevance_score": 3}, {"name": "alibaba/page-agent", "owner": "alibaba", "repo": "page-agent", "url": "https://github.com/alibaba/page-agent", "description_en": "JavaScript in-page GUI agent. Control web interfaces with natural language.", "description_zh": "JavaScript 页内 GUI 代理。使用自然语言控制 Web 界面。", "stars": 10204, "forks": 779, "stars_period": 7084, "matched_keywords": ["agent"], "tags": ["agent"], "relevance_score": 9}, {"name": "promptfoo/promptfoo", "owner": "promptfoo", "repo": "promptfoo", "url": "https://github.com/promptfoo/promptfoo", "description_en": "Test your prompts, agents, and RAGs. Red teaming/pentesting/vulnerability scanning for AI. Compare performance of GPT, Claude, Gemini, Llama, and more. Simple declarative configs with command line and CI/CD integration.", "description_zh": "测试您的提示、代理和 RAG。AI 红队/渗透测试/漏洞扫描。比较 GPT、Claude、Gemini、Llama 等的性能。具有命令行和 CI/CD 集成的简单声明性配置。", "stars": 17077, "forks": 1478, "stars_period": 5792, "matched_keywords": ["ai", "claude", "gemini", "gpt"], "tags": ["llm"], "relevance_score": 8}, {"name": "NousResearch/hermes-agent", "owner": "NousResearch", "repo": "hermes-agent", "url": "https://github.com/NousResearch/hermes-agent", "description_en": "The agent that grows with you", "description_zh": "The agent that grows with you", "stars": 8339, "forks": 975, "stars_period": 5270, "matched_keywords": ["agent"], "tags": ["agent"], "relevance_score": 9}, {"name": "AstrBotDevs/AstrBot", "owner": "AstrBotDevs", "repo": "AstrBot", "url": "https://github.com/AstrBotDevs/AstrBot", "description_en": "Agentic IM Chatbot infrastructure that integrates lots of IM platforms, LLMs, plugins and AI feature, and can be your openclaw alternative. ✨", "description_zh": "Agentic IM 聊天机器人基础设施集成了许多 IM 平台、LLM、插件和 AI 功能，可以成为您的 openclaw 替代方案。✨", "stars": 25522, "forks": 1743, "stars_period": 5107, "matched_keywords": ["agentic", "ai"], "tags": ["agent"], "relevance_score": 5}, {"name": "fishaudio/fish-speech", "owner": "fishaudio", "repo": "fish-speech", "url": "https://github.com/fishaudio/fish-speech", "description_en": "SOTA Open Source TTS", "description_zh": "SOTA 开源 TTS", "stars": 27944, "forks": 2328, "stars_period": 2638, "matched_keywords": ["speech", "tts"], "tags": ["speech"], "relevance_score": 7}, {"name": "virattt/ai-hedge-fund", "owner": "virattt", "repo": "ai-hedge-fund", "url": "https://github.com/virattt/ai-hedge-fund", "description_en": "An AI Hedge Fund Team", "description_zh": "人工智能对冲基金团队", "stars": 49208, "forks": 8564, "stars_period": 2162, "matched_keywords": ["ai"], "tags": ["ai"], "relevance_score": 6}, {"name": "vectorize-io/hindsight", "owner": "vectorize-io", "repo": "hindsight", "url": "https://github.com/vectorize-io/hindsight", "description_en": "Hindsight: Agent Memory That Learns", "description_zh": "事后诸葛亮：智能体的学习记忆", "stars": 4522, "forks": 300, "stars_period": 1614, "matched_keywords": ["agent"], "tags": ["agent"], "relevance_score": 3}];
    let activeTag = 'all';
    let activeSort = 'stars_period';

    function formatNumber(n) {
      return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
    }

    function sortProjects(items) {
      const copy = [...items];
      copy.sort((a, b) => (b[activeSort] || 0) - (a[activeSort] || 0));
      return copy;
    }

    function renderProjects() {
      const listEl = document.getElementById('projectList');
      const filtered = activeTag === 'all'
        ? projects
        : projects.filter(p => (p.tags || []).includes(activeTag));
      const sorted = sortProjects(filtered);

      document.getElementById('totalCount').textContent = sorted.length;
      document.getElementById('totalStars').textContent = sorted.reduce((sum, p) => sum + (p.stars_period || 0), 0).toLocaleString();

      if (!sorted.length) {
        listEl.innerHTML = '<div class="empty">没有找到匹配项目</div>';
        return;
      }

      listEl.innerHTML = sorted.map(p => `
        <div class="project-card">
          <div class="project-header">
            <a class="project-name" href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a>
            <div class="project-stats">
              <span class="stat star">⭐ ${formatNumber(p.stars)}</span>
              <span class="stat period">+${(p.stars_period || 0).toLocaleString()}</span>
              <span class="stat">⑂ ${formatNumber(p.forks)}</span>
              <span class="stat">相关性 ${p.relevance_score || 0}</span>
            </div>
          </div>
          <div class="project-desc-zh">${p.description_zh || '暂无中文简介'}</div>
          <div class="project-desc-en">${p.description_en || ''}</div>
          <div class="keywords">
            ${(p.tags || []).map(tag => `<span class="keyword">${tag}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    document.querySelectorAll('.tag-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tag-btn').forEach(node => node.classList.remove('active'));
        btn.classList.add('active');
        activeTag = btn.dataset.tag;
        renderProjects();
      });
    });

    document.getElementById('sortSelect').addEventListener('change', (event) => {
      activeSort = event.target.value;
      renderProjects();
    });

    renderProjects();
  </script>
</body>
</html>
