name: Daily GitHub Trending AI Collection

on:
  schedule:
    # 北京时间每天早上 8:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        period: [daily, weekly, monthly]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Collect trending data
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TRANSLATION_MODEL: openrouter/openai/gpt-5.4
          TRENDING_PERIOD: ${{ matrix.period }}
        run: python collector.py

      - name: Generate static pages
        run: python generate_html.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto update trending data'
          file_pattern: 'data/**/*.json data/**/*.md *.html'
